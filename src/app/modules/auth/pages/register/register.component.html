<div class="auth-layout">
  <!-- Left Panel: Brand & Illustration -->
  <div class="brand-panel">
    <div class="brand-header sora-font">
      <mat-icon [inline]="true" class="logo-icon">rocket_launch</mat-icon>
      LogiSight
    </div>
    <div class="brand-content">
      <h2 class="sora-font stagger-1">Join the Logistics Revolution.</h2>
      <p class="stagger-2">Create an account and start managing your deliveries with precision.</p>
      
      <div class="illustration-container stagger-3">
        <svg viewBox="0 0 400 200" class="delivery-svg">
          <path d="M 0 150 Q 150 180 250 120 T 400 150" fill="none" class="road-path" />
          <circle r="8" class="truck-dot" fill="var(--white)" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Right Panel: Form -->
  <div class="form-panel">
    <div class="form-container">
      <h2 class="form-title sora-font">Create Account</h2>
      <p class="form-subtitle">Join us to scale your logistics operations.</p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
        
        <div class="role-selector">
          <label>Select Your Role</label>
          <div class="role-cards">
            <div class="role-card" 
                 *ngFor="let role of roles" 
                 [class.selected]="registerForm.get('role')?.value === role.value"
                 (click)="setRole(role.value)">
              <mat-icon>{{ role.icon }}</mat-icon>
              <span>{{ role.label }}</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label>Full Name</label>
            <div class="input-wrapper">
              <input type="text" formControlName="fullName" class="input-glow" placeholder="John Doe">
            </div>
          </div>
          <div class="form-group flex-1">
            <label>Phone Number</label>
            <div class="input-wrapper">
              <input type="tel" formControlName="phone" class="input-glow" placeholder="+254...">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">email</mat-icon>
            <input type="email" formControlName="email" class="input-glow" placeholder="Enter your email">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label>Password</label>
            <div class="input-wrapper">
              <input type="password" formControlName="password" class="input-glow" placeholder="••••••••">
            </div>
          </div>
          <div class="form-group flex-1">
            <label>Confirm Password</label>
            <div class="input-wrapper">
              <input type="password" formControlName="confirmPassword" class="input-glow" placeholder="••••••••">
            </div>
          </div>
        </div>
        <div class="error-msg slide-down" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </div>

        <button type="submit" class="btn-primary btn-submit sora-font btn-scale" [disabled]="registerForm.invalid || isLoading">
          <span *ngIf="!isLoading">Create Account</span>
          <mat-icon *ngIf="isLoading" class="spinner">autorenew</mat-icon>
        </button>

        <p class="register-prompt">
          Already have an account? <a routerLink="/login">Sign in here</a>
        </p>
      </form>
    </div>
  </div>
</div>
